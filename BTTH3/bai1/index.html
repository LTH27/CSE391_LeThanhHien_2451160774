<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản Lý Sinh Viên</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-logo">
        <span class="logo-icon">🎓</span>
        <h1>Quản Lý Sinh Viên</h1>
      </div>
      <button class="btn btn-primary" id="btnOpenForm">
        <span>＋</span> Thêm Sinh Viên
      </button>
    </div>
  </header>

  <!-- Thống kê -->
  <section class="stats-section">
    <div class="stat-card">
      <div class="stat-icon">👥</div>
      <div class="stat-info">
        <span class="stat-value" id="totalStudents">0</span>
        <span class="stat-label">Tổng sinh viên</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📊</div>
      <div class="stat-info">
        <span class="stat-value" id="avgScore">0.00</span>
        <span class="stat-label">Điểm TB toàn lớp</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🏆</div>
      <div class="stat-info">
        <span class="stat-value" id="topScore">—</span>
        <span class="stat-label">Điểm cao nhất</span>
      </div>
    </div>
  </section>

  <!-- Thông báo -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Bảng dữ liệu -->
  <main class="main-content">
    <div class="table-wrapper">
      <table class="student-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Mã SV</th>
            <th>Họ và Tên</th>
            <th>Ngày Sinh</th>
            <th>Lớp</th>
            <th>Điểm TB</th>
            <th>Email</th>
            <th>Thao Tác</th>
          </tr>
        </thead>
        <tbody id="studentTableBody">
          <!-- render bằng JS -->
        </tbody>
      </table>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📋</div>
        <p>Chưa có sinh viên nào. Hãy thêm sinh viên đầu tiên!</p>
      </div>
    </div>
  </main>

  <!-- Modal Form -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Thêm Sinh Viên</h2>
        <button class="btn-close" id="btnCloseForm">✕</button>
      </div>
      <form id="studentForm" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label for="maSV">Mã Sinh Viên <span class="required">*</span></label>
            <input type="text" id="maSV" placeholder="VD: SV001" />
            <span class="field-error" id="err-maSV"></span>
          </div>
          <div class="form-group">
            <label for="hoTen">Họ và Tên <span class="required">*</span></label>
            <input type="text" id="hoTen" placeholder="VD: Nguyễn Văn A" />
            <span class="field-error" id="err-hoTen"></span>
          </div>
          <div class="form-group">
            <label for="ngaySinh">Ngày Sinh <span class="required">*</span></label>
            <input type="date" id="ngaySinh" />
            <span class="field-error" id="err-ngaySinh"></span>
          </div>
          <div class="form-group">
            <label for="lopHoc">Lớp Học <span class="required">*</span></label>
            <input type="text" id="lopHoc" placeholder="VD: CNTT-K66" />
            <span class="field-error" id="err-lopHoc"></span>
          </div>
          <div class="form-group">
            <label for="diemTB">Điểm Trung Bình <span class="required">*</span></label>
            <input type="number" id="diemTB" placeholder="0 – 10" min="0" max="10" step="0.01" />
            <span class="field-error" id="err-diemTB"></span>
          </div>
          <div class="form-group">
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" placeholder="vd@email.com" />
            <span class="field-error" id="err-email"></span>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="btnCancel">Hủy</button>
          <button type="submit" class="btn btn-primary" id="btnSubmit">Lưu</button>
        </div>
      </form>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
