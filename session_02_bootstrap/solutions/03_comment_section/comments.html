<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Comment Section Solution</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .comment img.rounded-circle {
            width: 50px;
            height: 50px;
            object-fit: cover;
        }
        .comment.reply img.rounded-circle {
            width: 40px;
            height: 40px;
        }
        .comment.reply {
            border-left: 3px solid #e2e8f0;
            padding-left: 1rem;
        }
        .btn-link {
            color: #0d6efd;
        }
    </style>
</head>
<body>
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xl-8">
                    <div class="card mb-4">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">Leave a Comment</h5>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="name" class="form-label">Name</label>
                                        <input type="text" class="form-control" id="name" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="email" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="email" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="comment" class="form-label">Comment</label>
                                    <textarea class="form-control" id="comment" rows="4" required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary">Post Comment</button>
                            </form>
                        </div>
                    </div>

                    <div class="comments-section">
                        <h5 class="mb-4">3 Comments</h5>

                        <div class="comment mb-4">
                            <div class="d-flex">
                                <img src="https://via.placeholder.com/50" class="rounded-circle me-3" alt="Avatar">
                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <h6 class="mb-0">John Doe</h6>
                                        <small class="text-muted">2 hours ago</small>
                                    </div>
                                    <p class="mb-2">Great article! Very helpful for beginners.</p>
                                    <button class="btn btn-sm btn-link text-decoration-none"><i class="bi bi-reply"></i> Reply</button>

                                    <div class="comment reply ms-5 mt-3">
                                        <div class="d-flex">
                                            <img src="https://via.placeholder.com/40" class="rounded-circle me-3" alt="Avatar">
                                            <div class="flex-grow-1">
                                                <div class="d-flex justify-content-between align-items-center mb-2">
                                                    <h6 class="mb-0">Author</h6>
                                                    <small class="text-muted">1 hour ago</small>
                                                </div>
                                                <p class="mb-0">Thank you! Glad it helped.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="comment mb-4">
                            <div class="d-flex">
                                <img src="https://via.placeholder.com/50" class="rounded-circle me-3" alt="Avatar">
                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <h6 class="mb-0">Anna Smith</h6>
                                        <small class="text-muted">5 hours ago</small>
                                    </div>
                                    <p class="mb-2">I love the clean layout and the responsive design.</p>
                                    <button class="btn btn-sm btn-link text-decoration-none"><i class="bi bi-reply"></i> Reply</button>
                                </div>
                            </div>
                        </div>

                        <div class="comment mb-4">
                            <div class="d-flex">
                                <img src="https://via.placeholder.com/50" class="rounded-circle me-3" alt="Avatar">
                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <h6 class="mb-0">Mark Lee</h6>
                                        <small class="text-muted">1 day ago</small>
                                    </div>
                                    <p class="mb-2">Nice write-up! I found the examples very clear.</p>
                                    <button class="btn btn-sm btn-link text-decoration-none"><i class="bi bi-reply"></i> Reply</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
